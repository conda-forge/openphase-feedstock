{% set name = "openphase" %}
{% set version = "2.1" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://github.com/ICAMS/OpenPhase/archive/Release/{{ version }}.tar.gz
  sha256: 4c765d576550dc56b84ac76061ecbcbc98e74b9608840d1489a523f22f014583

build:
  number: 1
  skip: true  # [not linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
    - cmake
    - make  # [unix]
  host:
    - fftw
    - python
    - pybind11
  run:
    - fftw
    - python

test:
  imports:
    - OpenPhase
  commands:
    - test -f $PREFIX/bin/openphase || test -f $PREFIX/lib/libOpenPhase.so  # [unix]

about:
  home: https://github.com/ICAMS/OpenPhase
  summary: "High-performance phase-field simulation framework for materials science"
  description: |
    OpenPhase is a modular, high-performance phase-field simulation framework
    for modeling microstructure evolution in materials science.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
    - samwaseda
